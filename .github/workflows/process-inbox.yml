name: Process Inbox

on:
  push:
    paths:
      - 'inbox/*'
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process drafts
        run: |
          shopt -s nullglob

          # Get current date info (same for all files in this run)
          year=$(date +%Y)
          month=$(date +%m)
          date_full=$(date +%Y-%m-%d)
          target_dir="posts/$year/$month"
          image_path="/$year/$month"

          for draft in inbox/*.md; do
            [ -f "$draft" ] || continue

            filename=$(basename "$draft")
            echo "Processing: $filename"

            # Extract title from first H1 (# Title)
            title=$(grep -m 1 '^# ' "$draft" | sed 's/^# //')

            if [ -z "$title" ]; then
              echo "No H1 header found in $filename, skipping"
              continue
            fi

            echo "Title: $title"

            # Generate slug from title (lowercase, replace non-alphanumeric with hyphens)
            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-|-$//g')
            echo "Slug: $slug"

            # Create target directory
            mkdir -p "$target_dir"

            # Generate filename with underscores (matching your convention)
            slug_snake=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/_/g; s/^_|_$//g')
            target_file="$target_dir/${slug_snake}.md"

            # Check for optional tags on line 2
            content_start=2
            extra_tags=""
            line2=$(sed -n '2p' "$draft")
            if echo "$line2" | grep -q '^tags:'; then
              extra_tags=$(echo "$line2" | sed 's/^tags: *//')
              content_start=3
            fi

            # Build tags list
            tags_yaml="  - post"
            if [ -n "$extra_tags" ]; then
              IFS=',' read -ra tag_array <<< "$extra_tags"
              for tag in "${tag_array[@]}"; do
                tag=$(echo "$tag" | sed 's/^ *//;s/ *$//')
                tags_yaml="${tags_yaml}"$'\n'"  - ${tag}"
              done
            fi

            # Build the post with frontmatter
            printf '%s\n' "---" "title: $title" "date: $date_full" "tags:" "$tags_yaml" "layout: layouts/post" "permalink: $slug/" "---" > "$target_file"

            # Append content after title (and optional tags line), rewriting image paths
            # Convert ![](image.png) to ![](/YYYY/MM/image.png)
            tail -n +$content_start "$draft" | sed -E "s#!\[([^]]*)\]\(([^/)][^)]*\.(png|jpg|jpeg|gif|webp))\)#![\1](${image_path}/\2)#g" >> "$target_file"

            echo "Created: $target_file"

            # Remove the draft
            rm "$draft"
            echo "Removed draft: $draft"
          done

          # Move any remaining files (images) to the target directory
          for file in inbox/*; do
            [ -f "$file" ] || continue

            filename=$(basename "$file")
            echo "Moving image: $filename to $target_dir/"

            mkdir -p "$target_dir"
            mv "$file" "$target_dir/"
            echo "Moved: $filename"
          done

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add posts/ inbox/
          git commit -m "Publish drafts to posts"
          git push
