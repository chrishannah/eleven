name: Process Link Posts

on:
  push:
    paths:
      - 'inbox-links/*'
    branches:
      - master

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Process link posts
        run: |
          shopt -s nullglob

          for draft in inbox-links/*.md; do
            [ -f "$draft" ] || continue

            filename=$(basename "$draft")
            echo "Processing: $filename"

            # Get current date/time info
            year=$(date +%Y)
            month=$(date +%m)
            datetime=$(date +%Y-%m-%d\ %H:%M:%S)
            # Slug generated from title after extraction below
            slug=""
            target_dir="posts/$year/$month"

            # Extract URL from first line
            link_url=$(head -n 1 "$draft")

            if [ -z "$link_url" ]; then
              echo "No URL found on first line of $filename, skipping"
              continue
            fi

            echo "Link URL: $link_url"

            # Extract title from H1 on second line
            title=$(sed -n '2p' "$draft" | sed 's/^# //')

            if [ -z "$title" ]; then
              echo "No H1 header found on line 2 of $filename, skipping"
              continue
            fi

            echo "Title: $title"

            # Generate slug from title
            slug=$(echo "$title" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

            # Check for optional tags on line 3
            content_start=3
            extra_tags=""
            line3=$(sed -n '3p' "$draft")
            if echo "$line3" | grep -q '^tags:'; then
              extra_tags=$(echo "$line3" | sed 's/^tags: *//')
              content_start=4
            fi

            # Build tags list
            tags_yaml="  - link"
            if [ -n "$extra_tags" ]; then
              IFS=',' read -ra tag_array <<< "$extra_tags"
              for tag in "${tag_array[@]}"; do
                tag=$(echo "$tag" | sed 's/^ *//;s/ *$//')
                tags_yaml="${tags_yaml}"$'\n'"  - ${tag}"
              done
            fi

            # Create target directory
            mkdir -p "$target_dir"

            target_file="$target_dir/${slug}.md"

            # Build the post with frontmatter
            cat > "$target_file" << EOF
          ---
          categories:
          - link
          date: $datetime
          layout: layouts/link
          permalink: link/$slug/
          tags:
          $tags_yaml
          link: $link_url
          title: $title
          ---

          EOF

            # Append content (skip URL, title, and optional tags line)
            tail -n +$content_start "$draft" >> "$target_file"

            echo "Created: $target_file"

            # Remove the draft
            rm "$draft"
            echo "Removed draft: $draft"
          done

      - name: Commit and push changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"

          # Check if there are changes to commit
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git add posts/ inbox-links/
          git commit -m "Publish link post"
          git push
